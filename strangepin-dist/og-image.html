<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1200px; height:630px; overflow:hidden; }
  .frame {
    width:1200px; height:630px; position:relative;
    background:#07070e;
    font-family:'DM Sans',Arial,sans-serif;
  }
  /* Grid overlay */
  .grid {
    position:absolute; inset:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(232,98,26,0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,98,26,0.055) 1px, transparent 1px);
    background-size:72px 72px;
  }
  /* Dot map texture */
  .dots {
    position:absolute; inset:0; pointer-events:none;
    background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size:24px 24px;
    mask-image: radial-gradient(ellipse 85% 80% at 55% 45%, black 10%, transparent 80%);
  }
  /* Glow blobs */
  .g1 { position:absolute; width:620px; height:520px;
    background:radial-gradient(ellipse, rgba(232,98,26,0.16) 0%, transparent 65%);
    top:-80px; left:-80px; pointer-events:none; }
  .g2 { position:absolute; width:480px; height:420px;
    background:radial-gradient(circle, rgba(109,40,217,0.13) 0%, transparent 65%);
    bottom:-80px; right:-40px; pointer-events:none; }
  /* Content layout */
  .layout {
    position:absolute; inset:0;
    display:flex; align-items:center;
    padding:0 72px; gap:48px;
  }
  .left { flex:1; min-width:0; }
  .right { flex-shrink:0; width:240px; height:240px; position:relative; }
  /* Eyebrow */
  .eyebrow {
    font-family:'JetBrains Mono',monospace;
    font-size:12px; letter-spacing:4px; text-transform:uppercase;
    color:rgba(232,98,26,0.75); margin-bottom:20px;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow-line { width:28px; height:1px; background:rgba(232,98,26,0.5); }
  /* Brand name */
  .brand {
    font-family:'Syne',sans-serif;
    font-size:88px; font-weight:800;
    letter-spacing:-4px; line-height:0.9;
    margin-bottom:18px;
  }
  .b-strange { color:#eeeef5; }
  .b-pin { color:#e8621a; }
  /* Tagline */
  .tagline {
    font-family:'Georgia',serif;
    font-size:19px; font-style:italic;
    color:#7777a0; line-height:1.55;
    margin-bottom:28px;
  }
  /* Stats row */
  .stats { display:flex; align-items:center; gap:0; }
  .stat { padding:0 24px; text-align:center; }
  .stat:first-child { padding-left:0; }
  .stat-val {
    font-family:'JetBrains Mono',monospace;
    font-size:26px; font-weight:500;
    color:#e8621a; display:block; line-height:1;
  }
  .stat-lbl {
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:#55556a; margin-top:5px; display:block;
  }
  .divider { width:1px; height:36px; background:rgba(255,255,255,0.07); }
  /* Radar graphic */
  .radar-ring {
    position:absolute; border-radius:50%;
    border:1px solid rgba(232,98,26,0.2);
  }
  .r1 { inset:0; }
  .r2 { inset:30px; border-color:rgba(232,98,26,0.12); }
  .r3 { inset:60px; border-color:rgba(232,98,26,0.07); }
  .center-pin {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-60%);
    font-size:60px;
    filter:drop-shadow(0 0 16px rgba(232,98,26,0.55));
  }
  /* Crosshairs */
  .ch-v { position:absolute; left:50%; top:0; bottom:0; width:1px; background:rgba(232,98,26,0.08); }
  .ch-h { position:absolute; top:50%; left:0; right:0; height:1px; background:rgba(232,98,26,0.08); }
  /* Corner icons */
  .corner-icon {
    position:absolute; font-size:14px; opacity:0.45;
  }
  /* Bottom bar */
  .bottom {
    position:absolute; bottom:0; left:0; right:0;
    padding:16px 72px;
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px solid rgba(255,255,255,0.04);
  }
  .url {
    font-family:'JetBrains Mono',monospace;
    font-size:14px; letter-spacing:2px;
    color:rgba(232,98,26,0.5);
  }
  .tags { display:flex; gap:7px; }
  .tag {
    padding:4px 11px; border-radius:20px;
    font-size:11px; font-weight:500; letter-spacing:0.3px;
  }
  .tag-p { background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.2); color:#a78bfa; }
  .tag-t { background:rgba(34,211,238,0.09); border:1px solid rgba(34,211,238,0.18); color:#22d3ee; }
  .tag-a { background:rgba(251,191,36,0.09); border:1px solid rgba(251,191,36,0.18); color:#fbbf24; }
  /* Bottom accent line */
  .accent-line {
    position:absolute; bottom:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent 2%,rgba(232,98,26,0.5) 22%,rgba(109,40,217,0.4) 75%,transparent 98%);
  }
</style>
</head>
<body>
<div class="frame">
  <div class="grid"></div>
  <div class="dots"></div>
  <div class="g1"></div>
  <div class="g2"></div>

  <div class="layout">
    <!-- LEFT -->
    <div class="left">
      <div class="eyebrow">
        <span class="eyebrow-line"></span>
        Global Mystery Map
      </div>
      <div class="brand">
        <span class="b-strange">STRANGE</span><span class="b-pin">PIN</span>
      </div>
      <div class="tagline">
        The world is stranger than you think.<br>
        Discover. Explore. Pin the unexplained.
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-val">99+</span>
          <span class="stat-lbl">Locations</span>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-val">44</span>
          <span class="stat-lbl">Countries</span>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-val">14</span>
          <span class="stat-lbl">Languages</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: radar -->
    <div class="right">
      <div class="radar-ring r1"></div>
      <div class="radar-ring r2"></div>
      <div class="radar-ring r3"></div>
      <div class="ch-v"></div>
      <div class="ch-h"></div>
      <div class="center-pin">📍</div>
      <div class="corner-icon" style="top:12px;left:50%;transform:translateX(-50%);">👻</div>
      <div class="corner-icon" style="right:14px;top:50%;transform:translateY(-50%);">🛸</div>
      <div class="corner-icon" style="bottom:12px;left:50%;transform:translateX(-50%);">⚡</div>
      <div class="corner-icon" style="left:14px;top:50%;transform:translateY(-50%);">🌀</div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <span class="url">strangepin.com</span>
    <div class="tags">
      <span class="tag tag-p">👻 Haunted</span>
      <span class="tag tag-t">🛸 UFO</span>
      <span class="tag tag-t">⚡ Energy</span>
      <span class="tag tag-a">📖 Legends</span>
      <span class="tag tag-p">🌀 Strange</span>
    </div>
  </div>
  <div class="accent-line"></div>
</div>
</body>
</html>
